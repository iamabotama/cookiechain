<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Cookie Chain</title>
  <script>
    // GitHub Pages SPA redirect trick — stores the full URL in sessionStorage
    // then redirects to the root; index.html reads it back and restores the path
    sessionStorage.redirect = location.href;
    window.location.replace(
      location.protocol + '//' + location.hostname +
      (location.port ? ':' + location.port : '') + '/'
    );
  </script>
</head>
</html>
